version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowdesk
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flowdesk
      DB_USERNAME: flowdesk
      DB_PASSWORD: flowdesk
      JWT_SECRET: change-me-to-a-long-random-secret-key
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
