server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowdesk}
    username: ${DB_USERNAME:flowdesk}
    password: ${DB_PASSWORD:flowdesk}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_TTL:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_TTL:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
